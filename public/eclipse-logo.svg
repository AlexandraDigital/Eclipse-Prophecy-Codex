<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eclipse-glow" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8a6d2a;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background dark circle -->
  <circle cx="100" cy="100" r="95" fill="#06080a" stroke="#c9a84c" stroke-width="2"/>
  
  <!-- Golden outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Sun (golden circle) -->
  <circle cx="100" cy="70" r="40" fill="#c9a84c" filter="url(#glow)"/>
  
  <!-- Eclipse shadow (dark circle) -->
  <circle cx="100" cy="85" r="42" fill="#06080a" opacity="0.95"/>
  
  <!-- Crescent highlight -->
  <path d="M 100 45 A 40 40 0 0 1 130 75 Q 120 65 100 45" fill="#c9a84c" opacity="0.8"/>
  
  <!-- Inner eclipse ring glow -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  
  <!-- Three seals around the eclipse -->
  <g opacity="0.7">
    <!-- Top seal -->
    <circle cx="100" cy="35" r="6" fill="#c9a84c" stroke="#8a6d2a" stroke-width="1"/>
    <text x="100" y="38" font-size="8" fill="#06080a" text-anchor="middle" font-weight="bold">◆</text>
    
    <!-- Bottom left seal -->
    <circle cx="60" cy="145" r="6" fill="#c9a84c" stroke="#8a6d2a" stroke-width="1"/>
    <text x="60" y="148" font-size="8" fill="#06080a" text-anchor="middle" font-weight="bold">◆</text>
    
    <!-- Bottom right seal -->
    <circle cx="140" cy="145" r="6" fill="#c9a84c" stroke="#8a6d2a" stroke-width="1"/>
    <text x="140" y="148" font-size="8" fill="#06080a" text-anchor="middle" font-weight="bold">◆</text>
  </g>
  
  <!-- Mystical lines -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#8a6d2a" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="#8a6d2a" stroke-width="0.5" opacity="0.3"/>
</svg>