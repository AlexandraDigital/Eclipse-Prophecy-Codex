<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer hex with gold border - larger to fill space -->
  <polygon points="50,2 98,25 98,75 50,98 2,75 2,25"
    fill="#06080a" stroke="#c9a84c" stroke-width="2.5"/>
  <!-- Inner hex subtle glow fill -->
  <polygon points="50,8 92,32 92,68 50,92 8,68 8,32"
    fill="#0b0f14" stroke="#8a6d2a" stroke-width="1"/>
  <!-- Full moon / sun behind - larger -->
  <circle cx="40" cy="50" r="24" fill="#c9a84c" opacity="0.85"/>
  <!-- Eclipse shadow moon - larger -->
  <circle cx="60" cy="50" r="24" fill="#06080a"/>
</svg>