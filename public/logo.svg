<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer hex with gold border -->
  <polygon points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5"
    fill="#06080a" stroke="#c9a84c" stroke-width="2.5"/>
  <!-- Inner hex subtle glow fill -->
  <polygon points="50,12 85,31 85,69 50,88 15,69 15,31"
    fill="#0b0f14" stroke="#8a6d2a" stroke-width="1"/>
  <!-- Full moon / sun behind -->
  <circle cx="43" cy="50" r="19" fill="#c9a84c" opacity="0.85"/>
  <!-- Eclipse shadow moon -->
  <circle cx="57" cy="50" r="19" fill="#06080a"/>
  <!-- Eclipse crescent glow ring -->
  <circle cx="43" cy="50" r="19" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <!-- Small stars -->
  <circle cx="26" cy="30" r="1.2" fill="#c9a84c" opacity="0.55"/>
  <circle cx="74" cy="36" r="0.9" fill="#c9a84c" opacity="0.40"/>
  <circle cx="72" cy="68" r="1.2" fill="#c9a84c" opacity="0.50"/>
  <circle cx="28" cy="70" r="0.8" fill="#c9a84c" opacity="0.35"/>
  <circle cx="80" cy="52" r="1" fill="#c9a84c" opacity="0.30"/>
  <!-- Top hex pip -->
  <polygon points="50,8 54,12 50,16 46,12"
    fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
</svg>
